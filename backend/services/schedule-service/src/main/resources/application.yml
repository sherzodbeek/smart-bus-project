spring:
  application:
    name: schedule-service
  cache:
    cache-names: routeCatalog,routeDefinition,locationCatalog,locationById
  datasource:
    url: ${SCHEDULE_DB_URL:jdbc:postgresql://localhost:5433/smartbus_schedule}
    username: ${SCHEDULE_DB_USERNAME:smartbus}
    password: ${SCHEDULE_DB_PASSWORD:smartbus}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,caches,metrics

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%X{requestId:--}] [%X{bookingReference:--}] %logger{35} - %msg%n"

info:
  app:
    name: SmartBus Schedule Service
    phase: foundation

smartbus:
  cache:
    data-ttl: ${SCHEDULE_DATA_CACHE_TTL:PT5M}
    output-ttl: ${SCHEDULE_OUTPUT_CACHE_TTL:PT30S}
    simulated-latency: ${SCHEDULE_SIMULATED_LATENCY:PT0.06S}

spring:
  application:
    name: smartbus-gateway
  datasource:
    url: ${GATEWAY_DB_URL:jdbc:postgresql://localhost:5433/smartbus_booking}
    username: ${GATEWAY_DB_USERNAME:smartbus}
    password: ${GATEWAY_DB_PASSWORD:smartbus}
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%X{requestId:--}] [%X{bookingReference:--}] %logger{35} - %msg%n"

info:
  app:
    name: SmartBus Gateway
    phase: foundation

smartbus:
  services:
    booking: ${BOOKING_SERVICE_URL:http://localhost:8081}
    schedule: ${SCHEDULE_SERVICE_URL:http://localhost:8082}
    payment: ${PAYMENT_SERVICE_URL:http://localhost:8083}
    notification: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
  ml:
    server: ${ML_SERVER_URL:http://localhost:5050}
  auth:
    jwt-secret: ${SMARTBUS_JWT_SECRET:smartbus-smartbus-smartbus-smartbus-secret-key-2026}
    jwt-expiration: ${SMARTBUS_JWT_EXPIRATION:PT8H}
    admin-email: ${SMARTBUS_ADMIN_EMAIL:admin@smartbus.local}
    admin-password: ${SMARTBUS_ADMIN_PASSWORD:Admin123!}
    admin-name: ${SMARTBUS_ADMIN_NAME:SmartBus Admin}

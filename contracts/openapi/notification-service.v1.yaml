openapi: 3.1.0
info:
  title: SmartBus Notification Service API
  version: 2.0.0
  description: Notification preparation, dispatch, and delivery-log contract for SmartBus.
servers:
  - url: http://localhost:8084
tags:
  - name: Notification
paths:
  /api/v1/notifications/foundation:
    get:
      operationId: getNotificationFoundation
      summary: Get notification service foundation metadata
      tags: [Notification]
      responses:
        '200':
          description: Service metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'

  /api/v1/notifications/prepare:
    post:
      operationId: prepareNotification
      summary: Prepare a booking confirmation notification
      tags: [Notification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreparationRequest'
            examples:
              prepare:
                value:
                  bookingReference: BK-1234ABCD
                  customerName: Jane Rider
                  customerEmail: jane@example.com
                  routeCode: SB-101
      responses:
        '200':
          description: Notification preparation returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreparationResponse'
              examples:
                prepared:
                  value:
                    templateId: BOOKING-CONFIRMATION
                    previewMessage: Trip SB-101 is being prepared for Jane Rider
                    channel: EMAIL
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/notifications/dispatch:
    post:
      operationId: dispatchNotification
      summary: Dispatch a prepared booking notification
      tags: [Notification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationDispatchRequest'
      responses:
        '200':
          description: Notification dispatch returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDispatchResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/notifications/deliveries:
    post:
      operationId: createDelivery
      summary: Record a notification delivery (admin)
      tags: [Notification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationDeliveryRequest'
      responses:
        '201':
          description: Delivery record created successfully.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDeliveryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    get:
      operationId: listDeliveries
      summary: List notification deliveries, optionally filtered by booking reference
      tags: [Notification]
      parameters:
        - name: bookingReference
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Delivery history returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationDeliveryResponse'

  /api/v1/notifications/deliveries/{id}:
    get:
      operationId: getDelivery
      summary: Get a notification delivery by ID
      tags: [Notification]
      parameters:
        - $ref: '#/components/parameters/DeliveryId'
      responses:
        '200':
          description: Delivery returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDeliveryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateDelivery
      summary: Update a notification delivery record
      tags: [Notification]
      parameters:
        - $ref: '#/components/parameters/DeliveryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationDeliveryRequest'
      responses:
        '200':
          description: Delivery updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDeliveryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteDelivery
      summary: Delete a notification delivery record
      tags: [Notification]
      parameters:
        - $ref: '#/components/parameters/DeliveryId'
      responses:
        '204':
          description: Delivery deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    DeliveryId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    FoundationResponse:
      type: object
      required: [service, responsibility, database, plannedOperations]
      properties:
        service:
          type: string
        responsibility:
          type: string
        database:
          type: string
        plannedOperations:
          type: array
          items:
            type: string

    NotificationPreparationRequest:
      type: object
      required: [bookingReference, customerName, customerEmail, routeCode]
      properties:
        bookingReference:
          type: string
          minLength: 1
        customerName:
          type: string
          minLength: 1
        customerEmail:
          type: string
          format: email
        routeCode:
          type: string
          minLength: 1

    NotificationPreparationResponse:
      type: object
      required: [templateId, previewMessage, channel]
      properties:
        templateId:
          type: string
        previewMessage:
          type: string
        channel:
          type: string

    NotificationDispatchRequest:
      type: object
      required: [bookingReference, recipient, message]
      properties:
        bookingReference:
          type: string
          minLength: 1
        recipient:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    NotificationDispatchResponse:
      type: object
      required: [notificationId, status]
      properties:
        notificationId:
          type: string
        status:
          type: string

    NotificationDeliveryRequest:
      type: object
      required: [bookingReference, recipient, status]
      properties:
        bookingReference:
          type: string
          minLength: 1
        recipient:
          type: string
          minLength: 1
        routeCode:
          type: string
          nullable: true
        status:
          type: string
          minLength: 1

    NotificationDeliveryResponse:
      type: object
      required: [id, bookingReference, recipient, status, deliveredAt]
      properties:
        id:
          type: integer
          format: int64
        bookingReference:
          type: string
        recipient:
          type: string
        routeCode:
          type: string
          nullable: true
        status:
          type: string
        deliveredAt:
          type: string
          format: date-time

    ApiErrorResponse:
      type: object
      required: [status, code, message, details, path]
      properties:
        status:
          type: integer
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
        path:
          type: string

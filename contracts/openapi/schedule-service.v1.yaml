openapi: 3.1.0
info:
  title: SmartBus Schedule Service API
  version: 2.0.0
  description: Route, quote, and fare-management contract for SmartBus trip search.
servers:
  - url: http://localhost:8082
tags:
  - name: Schedule
  - name: Admin
paths:
  /api/v1/schedules/foundation:
    get:
      operationId: getScheduleFoundation
      summary: Get schedule service foundation metadata
      tags: [Schedule]
      responses:
        '200':
          description: Service metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'

  /api/v1/schedules/catalog:
    get:
      operationId: getRouteCatalog
      summary: Get the current SmartBus route catalog
      tags: [Schedule]
      responses:
        '200':
          description: Route catalog returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteCatalogResponse'

  /api/v1/schedules/quote:
    post:
      operationId: quoteTrip
      summary: Quote a SmartBus route for a passenger search
      tags: [Schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleQuoteRequest'
            examples:
              oneWay:
                value:
                  fromStop: Downtown Terminal
                  toStop: Airport Station
                  tripDate: '2026-04-20'
                  tripType: one-way
                  passengers: 1
      responses:
        '200':
          description: Quote returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleQuoteResponse'
              examples:
                available:
                  value:
                    tripAvailable: true
                    returnTripAvailable: true
                    routeCode: SB-101
                    departureTime: 08:00 AM
                    arrivalTime: 09:15 AM
                    unitPrice: 12.5
                    availableSeats: 23
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/schedules/admin/locations:
    get:
      operationId: listLocations
      summary: List all known stop locations
      tags: [Admin]
      responses:
        '200':
          description: Locations returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationResponse'
    post:
      operationId: createLocation
      summary: Create a new stop location
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationRequest'
      responses:
        '201':
          description: Location created successfully.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/schedules/admin/locations/{id}:
    get:
      operationId: getLocation
      summary: Get a stop location by ID
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '200':
          description: Location returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateLocation
      summary: Rename a stop location
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/LocationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationRequest'
      responses:
        '200':
          description: Location updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConflictError'
    delete:
      operationId: deleteLocation
      summary: Delete a stop location
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '204':
          description: Location deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/v1/schedules/admin/routes:
    post:
      operationId: createRoute
      summary: Create a new bus route
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRouteRequest'
      responses:
        '201':
          description: Route created successfully.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteDefinition'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/schedules/admin/routes/{routeCode}:
    get:
      operationId: getRoute
      summary: Get a route by code
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/RouteCode'
      responses:
        '200':
          description: Route returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteDefinition'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateRoute
      summary: Replace a route definition
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/RouteCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRouteRequest'
      responses:
        '200':
          description: Route updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteDefinition'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteRoute
      summary: Delete a bus route
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/RouteCode'
      responses:
        '204':
          description: Route deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/schedules/admin/routes/{routeCode}/fare:
    post:
      operationId: updateRouteFare
      summary: Update a route fare and invalidate schedule caches
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/RouteCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FareUpdateRequest'
      responses:
        '200':
          description: Fare updated and caches invalidated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FareUpdateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    RouteCode:
      name: routeCode
      in: path
      required: true
      schema:
        type: string
      example: SB-101
    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ConflictError:
      description: Conflicting state — resource in use or name taken.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    FoundationResponse:
      type: object
      required: [service, responsibility, database, plannedOperations]
      properties:
        service:
          type: string
        responsibility:
          type: string
        database:
          type: string
        plannedOperations:
          type: array
          items:
            type: string

    ScheduleQuoteRequest:
      type: object
      required: [fromStop, toStop, tripDate, tripType, passengers]
      properties:
        fromStop:
          type: string
          minLength: 1
        toStop:
          type: string
          minLength: 1
        tripDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        tripType:
          type: string
          enum: [one-way, round-trip]
        passengers:
          type: integer
          minimum: 1
          maximum: 6

    ScheduleQuoteResponse:
      type: object
      required: [tripAvailable, returnTripAvailable, routeCode, departureTime, arrivalTime, unitPrice, availableSeats]
      properties:
        tripAvailable:
          type: boolean
        returnTripAvailable:
          type: boolean
        routeCode:
          type: string
        departureTime:
          type: string
        arrivalTime:
          type: string
        unitPrice:
          type: number
          format: double
        availableSeats:
          type: integer

    RouteCatalogResponse:
      type: object
      required: [routes]
      properties:
        routes:
          type: array
          items:
            $ref: '#/components/schemas/RouteDefinition'

    RouteDefinition:
      type: object
      required: [routeCode, fromStop, toStop, departureTime, arrivalTime, unitPrice, seatsAvailable]
      properties:
        routeCode:
          type: string
        fromStop:
          type: string
        toStop:
          type: string
        departureTime:
          type: string
        arrivalTime:
          type: string
        unitPrice:
          type: number
          format: double
        seatsAvailable:
          type: integer

    AdminRouteRequest:
      type: object
      required: [routeCode, fromStop, toStop, departureTime, arrivalTime, unitPrice, seatsAvailable]
      properties:
        routeCode:
          type: string
          minLength: 1
        fromStop:
          type: string
          minLength: 1
        toStop:
          type: string
          minLength: 1
        departureTime:
          type: string
          minLength: 1
        arrivalTime:
          type: string
          minLength: 1
        unitPrice:
          type: number
          format: double
          minimum: 0.01
        seatsAvailable:
          type: integer
          minimum: 1

    LocationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    LocationResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    FareUpdateRequest:
      type: object
      required: [unitPrice]
      properties:
        unitPrice:
          type: number
          format: double
          minimum: 0.01

    FareUpdateResponse:
      type: object
      required: [routeCode, unitPrice, cacheInvalidated]
      properties:
        routeCode:
          type: string
        unitPrice:
          type: number
          format: double
        cacheInvalidated:
          type: boolean

    ApiErrorResponse:
      type: object
      required: [status, code, message, details, path]
      properties:
        status:
          type: integer
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
        path:
          type: string

openapi: 3.1.0
info:
  title: SmartBus Payment Service API
  version: 2.0.0
  description: Payment authorization and record management contract for SmartBus bookings.
servers:
  - url: http://localhost:8083
tags:
  - name: Payment
paths:
  /api/v1/payments/foundation:
    get:
      operationId: getPaymentFoundation
      summary: Get payment service foundation metadata
      tags: [Payment]
      responses:
        '200':
          description: Service metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'

  /api/v1/payments/authorize:
    post:
      operationId: authorizePayment
      summary: Authorize a payment for a booking
      tags: [Payment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentAuthorizationRequest'
            examples:
              approval:
                value:
                  bookingReference: BK-1234ABCD
                  customerEmail: jane@example.com
                  amount: 12.5
                  paymentMethodToken: tok_visa_4242
      responses:
        '201':
          description: Payment authorization result returned.
          headers:
            Location:
              description: URL of the payment record resource.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentAuthorizationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/payments/records:
    get:
      operationId: listPaymentRecords
      summary: List payment records, optionally filtered by booking reference
      tags: [Payment]
      parameters:
        - name: bookingReference
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Payment records returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentRecordResponse'

  /api/v1/payments/records/{transactionId}:
    get:
      operationId: getPaymentRecord
      summary: Get a payment record by transaction ID
      tags: [Payment]
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Payment record returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRecordResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updatePaymentStatus
      summary: Update the status of a payment record
      tags: [Payment]
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentStatusUpdateRequest'
            examples:
              refund:
                value:
                  status: REFUNDED
      responses:
        '200':
          description: Payment record status updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRecordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePaymentRecord
      summary: Delete a payment record by transaction ID
      tags: [Payment]
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '204':
          description: Payment record deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
      example: PAY-89AB12CD

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    FoundationResponse:
      type: object
      required: [service, responsibility, database, plannedOperations]
      properties:
        service:
          type: string
        responsibility:
          type: string
        database:
          type: string
        plannedOperations:
          type: array
          items:
            type: string

    PaymentAuthorizationRequest:
      type: object
      required: [bookingReference, customerEmail, amount, paymentMethodToken]
      properties:
        bookingReference:
          type: string
          minLength: 1
        customerEmail:
          type: string
          format: email
        amount:
          type: number
          format: double
          minimum: 0.01
        paymentMethodToken:
          type: string
          minLength: 1

    PaymentAuthorizationResponse:
      type: object
      required: [approved, transactionId, status, reason]
      properties:
        approved:
          type: boolean
        transactionId:
          type: string
        status:
          type: string
          enum: [AUTHORIZED, DECLINED]
        reason:
          type: string

    PaymentRecordResponse:
      type: object
      required: [transactionId, bookingReference, customerEmail, amount, status, reason, createdAt]
      properties:
        transactionId:
          type: string
        bookingReference:
          type: string
        customerEmail:
          type: string
        amount:
          type: number
          format: double
        status:
          type: string
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    PaymentStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          minLength: 1

    ApiErrorResponse:
      type: object
      required: [status, code, message, details, path]
      properties:
        status:
          type: integer
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
        path:
          type: string

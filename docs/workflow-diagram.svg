<svg xmlns="http://www.w3.org/2000/svg" width="860" height="940" viewBox="0 0 860 940">
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
    .lane { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 10 8; }
    .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
    .body { font: 14px Arial, sans-serif; fill: #334155; }
    .hint { font: 13px Arial, sans-serif; fill: #475569; }
    .step { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
    .partner { fill: #ecfccb; stroke: #3f6212; stroke-width: 2; rx: 16; ry: 16; }
    .flow { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 16; ry: 16; }
    .decision { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">SmartBus Booking Workflow</text>
  <rect x="24" y="82" width="812" height="826" class="lane"/>
  <text x="44" y="110" class="label">Booking Service Orchestrator with Flowable BPMN</text>

  <rect x="60" y="150" width="166" height="82" class="step"/>
  <text x="143" y="184" class="label" text-anchor="middle">Receive Booking</text>
  <text x="143" y="210" class="body" text-anchor="middle">
    <tspan x="143" dy="0">API request arrives</tspan>
    <tspan x="143" dy="22">bookingReference created</tspan>
  </text>

  <rect x="274" y="150" width="214" height="82" class="partner"/>
  <text x="381" y="184" class="label" text-anchor="middle">Invoke Schedule</text>
  <text x="381" y="210" class="body" text-anchor="middle">
    <tspan x="381" dy="0">Validate outbound trip</tspan>
    <tspan x="381" dy="22">Load quote and seats</tspan>
  </text>

  <polygon points="592,140 682,191 592,242 502,191" class="decision"/>
  <text x="592" y="182" class="label" text-anchor="middle">Trip Type</text>
  <text x="592" y="206" class="body" text-anchor="middle">Round-trip?</text>

  <rect x="126" y="300" width="188" height="72" class="step"/>
  <text x="220" y="334" class="label" text-anchor="middle">One-way Path</text>
  <text x="220" y="358" class="body" text-anchor="middle">Continue directly</text>

  <rect x="546" y="300" width="188" height="72" class="step"/>
  <text x="640" y="334" class="label" text-anchor="middle">Validate Return</text>
  <text x="640" y="358" class="body" text-anchor="middle">Round-trip checks</text>

  <rect x="376" y="410" width="108" height="68" class="flow"/>
  <text x="430" y="442" class="label" text-anchor="middle">Flow</text>
  <text x="430" y="464" class="body" text-anchor="middle">Parallel split</text>

  <rect x="72" y="498" width="208" height="78" class="partner"/>
  <text x="176" y="532" class="label" text-anchor="middle">Invoke Payment</text>
  <text x="176" y="556" class="body" text-anchor="middle">Authorize transaction</text>

  <rect x="580" y="498" width="208" height="78" class="partner"/>
  <text x="684" y="532" class="label" text-anchor="middle">Prepare Notification</text>
  <text x="684" y="556" class="body" text-anchor="middle">Build confirmation message</text>

  <rect x="376" y="610" width="108" height="60" class="flow"/>
  <text x="430" y="645" class="label" text-anchor="middle">Join</text>

  <polygon points="430,676 520,728 430,780 340,728" class="decision"/>
  <text x="430" y="720" class="label" text-anchor="middle">Payment</text>
  <text x="430" y="744" class="body" text-anchor="middle">Approved?</text>

  <rect x="566" y="792" width="214" height="80" class="partner"/>
  <text x="673" y="826" class="label" text-anchor="middle">Dispatch Notification</text>
  <text x="673" y="852" class="body" text-anchor="middle">Send confirmation</text>

  <rect x="212" y="792" width="214" height="84" class="step"/>
  <text x="319" y="826" class="label" text-anchor="middle">Finalize Booking</text>
  <text x="319" y="852" class="body" text-anchor="middle">
    <tspan x="319" dy="0">Persist final state</tspan>
    <tspan x="319" dy="22">Publish Kafka event</tspan>
  </text>

  <rect x="62" y="792" width="112" height="84" class="step"/>
  <text x="118" y="826" class="label" text-anchor="middle">Reply</text>
  <text x="118" y="852" class="body" text-anchor="middle">Response</text>

  <path d="M226 191 H274" class="arrow"/>
  <path d="M488 191 H502" class="arrow"/>

  <path d="M566 238 V270 H220 V300" class="arrow"/>
  <path d="M618 242 V300" class="arrow"/>

  <path d="M220 372 V390 H430 V410" class="arrow"/>
  <path d="M640 372 V390 H430 V410" class="arrow"/>

  <path d="M376 444 H280 V537" class="arrow"/>
  <path d="M484 444 H580 V537" class="arrow"/>
  <path d="M430 478 V610" class="arrow"/>

  <path d="M176 576 V594 H376 V640" class="arrow"/>
  <path d="M684 576 V594 H484 V640" class="arrow"/>
  <path d="M430 670 V676" class="arrow"/>

  <path d="M520 728 H566 V832" class="arrow"/>
  <path d="M566 832 H426" class="arrow"/>
  <path d="M212 834 H174" class="arrow"/>

  <text x="520" y="292" class="hint">One-way</text>
  <text x="622" y="302" class="hint">Round-trip</text>
  <text x="430" y="596" class="hint" text-anchor="middle">Joined branches</text>
</svg>
